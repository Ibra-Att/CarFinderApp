services:
  api:
    build:
      context: ./API/CarFinderAPP-API
      dockerfile: Dockerfile
    ports:
      - "5230:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080

  client:
    build:
      context: ./Client/CarFinder-UI
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api